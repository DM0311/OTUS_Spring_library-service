spring:
  application:
    name: library-service

  datasource:
    url: jdbc:postgresql://localhost:5432/library_db
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    baseline-on-migrate: true

#  security:
#    jwt:
#      secret: ${JWT_SECRET:your-secret-key-with-at-least-32-characters}
#      expiration: 86400000 # 24 hours
#      refresh-expiration: 604800000 # 7 days

logging:
  level:
    com.otus.library: DEBUG
    org.springframework.security: INFO

server:
  port: 8080

